name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir huggingface-hub

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python << 'EOF'
          import os
          import sys
          from huggingface_hub import HfApi
          
          hf_token = os.environ.get('HF_TOKEN')
          hf_username = os.environ.get('HF_USERNAME')
          
          if not hf_token or not hf_username:
              print("ERROR: HF_TOKEN or HF_USERNAME not set")
              sys.exit(1)
          
          try:
              api = HfApi(token=hf_token)
              repo_id = f"{hf_username}/design-review-env"
              
              print(f"Uploading to: {repo_id}")
              
              api.upload_folder(
                  folder_path=".",
                  repo_id=repo_id,
                  repo_type="space",
                  ignore_patterns=[
                      ".git", ".github", "__pycache__", "*.pyc",
                      ".pytest_cache", ".venv", ".egg-info",
                      "dist", "build", ".DS_Store", "node_modules",
                      "SPACES_README.md", "README_SPACE.md"
                  ],
                  commit_message="Deploy from GitHub Actions"
              )
              
              print(f"Successfully deployed to: https://huggingface.co/spaces/{repo_id}")
              
          except Exception as e:
              print(f"ERROR: {type(e).__name__}: {e}")
              sys.exit(1)
          EOF

      - name: Verify deployment
        if: always()
        run: |
          echo "Deployment completed"
          echo "Check your Space: https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/design-review-env"
