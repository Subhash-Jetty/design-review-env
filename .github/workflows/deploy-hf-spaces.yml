name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HF_USERNAME: ${{ secrets.HF_USERNAME }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_SPACE_NAME: design-review-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub

      - name: Deploy to Hugging Face Spaces
        run: |
          python -c "
          from huggingface_hub import HfApi, RepoType
          import os
          
          api = HfApi()
          
          # Repository URL for the Space
          repo_id = f'{os.environ[\"HF_USERNAME\"]}/{os.environ[\"HF_SPACE_NAME\"]}'
          
          print(f'Deploying to Space: {repo_id}')
          
          # Upload all files to the Space repository
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type=RepoType.SPACE,
              token=os.environ['HF_TOKEN'],
              commit_message='Deploy: auto-updated from GitHub',
              ignore_patterns=['.*', '__pycache__', '*.pyc', '.git*', 'node_modules'],
          )
          
          print(f'Successfully deployed to: https://huggingface.co/spaces/{repo_id}')
          "
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Deployment Status
        if: always()
        run: |
          echo "Deployment workflow completed"
          echo "Check your Space at: https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/design-review-env"
