name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HF_USERNAME: ${{ secrets.HF_USERNAME }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_SPACE_NAME: design-review-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to HF Spaces using git
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Create temporary directory
          mkdir -p /tmp/hf-deploy
          cd /tmp/hf-deploy
          
          # Clone HF Space repository with credentials embedded in URL
          echo "Cloning HF Space repository..."
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/design-review-env.git" . || exit 1
          
          echo "Syncing files from GitHub repo..."
          # Copy files from GitHub workspace (excluding git, build artifacts, and workflows)
          cd /tmp/hf-deploy
          rm -rf .git .github __pycache__ .pytest_cache .venv .egg-info dist build *.pyc
          
          # Copy all files from workspace
          cp -r ${GITHUB_WORKSPACE}/* . 2>/dev/null || true
          cp -r ${GITHUB_WORKSPACE}/.[a-zA-Z]* . 2>/dev/null || true
          
          # Remove workflow files and workspace git
          rm -rf .git .github __pycache__ .pytest_cache .venv *.pyc
          
          # Use Space-specific README
          cp README_SPACE.md README.md 2>/dev/null || true
          
          # Initialize git again for Space repo
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-deploy from GitHub Actions on $(date)"
            git remote add origin "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/design-review-env.git"
            git push origin main --force
            echo "Successfully deployed to Hugging Face Spaces!"
          fi

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    
    steps:
      - name: Verify Space Deployment
        run: |
          echo "Space deployed at: https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/design-review-env"
          echo "Check deployment status in Space settings"
