name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HF_USERNAME: ${{ secrets.HF_USERNAME }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_SPACE_NAME: design-review-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Clone HF Space repo
        run: |
          git clone https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/design-review-env hf-space
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Copy files to Space
        run: |
          # Copy all files, excluding git and build artifacts
          rsync -av \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            --exclude='.egg-info' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='.github' \
            ./ hf-space/
          
          # Use Space-specific README
          cp README_SPACE.md hf-space/README.md

      - name: Commit and push to HF Space
        run: |
          cd hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-deploy from GitHub: $(date)"
            git push origin main
            echo "Successfully deployed to Hugging Face Spaces!"
          fi
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: actions@github.com

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    
    steps:
      - name: Verify Space Deployment
        run: |
          echo "Space deployed at: https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/design-review-env"
          echo "Check deployment status in Space settings"
